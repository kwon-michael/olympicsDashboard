name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Lint, typecheck & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Run scoring tests
        run: npm test

      # Lint is reported but does not fail the build yet: the project has
      # pre-existing lint errors unrelated to scoring. Remove continue-on-error
      # once those are cleaned up to make lint a hard gate.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true
